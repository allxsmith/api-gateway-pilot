  <!-- gateway arches -->
  <path d="M120 322 V170 a140 140 0 0 1 280 0 V322" stroke="#ffffff" stroke-opacity="0.30" stroke-width="10" stroke-linecap="round"/>
  <path d="M165 322 V182 a95 95 0 0 1 190 0 V322" stroke="#ffffff" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>
  <path d="M210 322 V192 a50 50 0 0 1 100 0 V322" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- requests flowing through -->
  <circle cx="56" cy="250" r="9" fill="#67e8f9"/>
  <circle cx="118" cy="250" r="8" fill="#22d3ee"/>
  <circle cx="260" cy="250" r="12" fill="#06b6d4"/>
  <circle cx="402" cy="250" r="8" fill="#22d3ee"/>
  <circle cx="464" cy="250" r="9" fill="#67e8f9"/>
  <!-- upgrade chevrons -->
